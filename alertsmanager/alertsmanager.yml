global:
  resolve_timeout: 5m
  # Fill these in with your own values (see README "Configuring notifications")
  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_from: 'alerts@example.com'
  smtp_auth_username: 'alerts@example.com'
  smtp_auth_password: 'REPLACE_WITH_APP_PASSWORD'
  smtp_require_tls: true
  slack_api_url: 'https://hooks.slack.com/services/REPLACE/WITH/YOUR_WEBHOOK'

route:
  receiver: default-receiver
  group_by: ['alertname', 'service']
  group_wait: 10s
  group_interval: 30s
  repeat_interval: 4h
  routes:

    # WARNING -> notify team Slack channel only, standard repeat interval
    - matchers:
        - severity="warning"
      receiver: team-slack
      group_wait: 10s
      repeat_interval: 1h
      continue: false

    # CRITICAL -> escalate: Slack (urgent channel) + Email, repeats fast until resolved
    - matchers:
        - severity="critical"
      receiver: oncall-escalation
      group_wait: 0s
      repeat_interval: 5m
      continue: false

receivers:
  - name: default-receiver
    slack_configs:
      - channel: '#alerts-general'
        send_resolved: true
        title: '{{ .CommonAnnotations.summary }}'
        text: '{{ .CommonAnnotations.description }}'

  - name: team-slack
    slack_configs:
      - channel: '#alerts-warning'
        send_resolved: true
        title: 'WARNING: {{ .CommonAnnotations.summary }}'
        text: '{{ .CommonAnnotations.description }}'

  - name: oncall-escalation
    slack_configs:
      - channel: '#alerts-critical'
        send_resolved: true
        title: ':rotating_light: CRITICAL: {{ .CommonAnnotations.summary }}'
        text: '{{ .CommonAnnotations.description }}'
    email_configs:
      - to: 'oncall-team@example.com'
        send_resolved: true

inhibit_rules:
  # If a service is already down (critical), suppress its warning-level
  # error-rate/latency noise for the same service to avoid alert spam.
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal: ['service']
